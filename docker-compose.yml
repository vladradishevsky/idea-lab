services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: idea_lab
      POSTGRES_USER: idea_lab
      POSTGRES_PASSWORD: idea_lab
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: /home/vr/projects/idea-lab/backend
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 10s
      timeout: 5s
      retries: 5
    entrypoint: ["/entrypoint.sh"]
    ports:
      - "8000:8000"
    volumes:
      - /home/vr/projects/idea-lab/backend:/app

  frontend:
    build:
      context: /home/vr/projects/idea-lab/frontend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:5173 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5173:5173"
    volumes:
      - /home/vr/projects/idea-lab/frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
