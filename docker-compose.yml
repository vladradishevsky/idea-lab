services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: idea_lab
      POSTGRES_USER: idea_lab
      POSTGRES_PASSWORD: idea_lab
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: /home/vr/projects/idea-lab/backend
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 10s
      timeout: 5s
      retries: 5
    entrypoint: ["/entrypoint.sh"]
    ports:
      - "8000:8000"
    volumes:
      - /home/vr/projects/idea-lab/backend:/app

  frontend:
    build:
      context: /home/vr/projects/idea-lab/frontend
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    healthcheck:
      test: ["CMD-SHELL", "ps -o comm= 1 | grep -q sleep"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - /home/vr/projects/idea-lab/frontend:/app

volumes:
  postgres_data:
